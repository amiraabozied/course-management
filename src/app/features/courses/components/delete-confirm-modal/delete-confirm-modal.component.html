<div class="modal-backdrop" (click)="cancelled.emit()">
  <section class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-title" (click)="$event.stopPropagation()">
    <h2 id="delete-title">Delete course?</h2>
    <p>Are you sure you want to delete "{{ courseName }}"?</p>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="cancelled.emit()">Cancel</button>
      <button type="button" class="btn-danger" (click)="confirmed.emit()">Delete</button>
    </div>
  </section>
</div>
